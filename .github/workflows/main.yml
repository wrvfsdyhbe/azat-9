name: Python Project CI/CD

# Переключаем Node.js для действий на версию 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-log-check:
    runs-on: ubuntu-latest

    steps:
    # 1. Копирование кода
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Установка Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 3. Установка зависимостей
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Dry run check
    - name: Dry run check (debug)
      run: |
        echo "Running lab8/main.py..."
        python lab8/main.py || echo "main.py failed!"
        echo "Files in lab8 folder:"
        ls -al lab8
        if [ -f lab8/app.log ]; then
          echo "Log file created!"
        else
          echo "Error: app.log not found"
          exit 1
        fi

    # 5. Debug log
    - name: Debug log
      run: |
        echo "Current repository contents:"
        ls -al
        echo "Content of lab8/app.log (if exists):"
        cat lab8/app.log || echo "Log file not found"